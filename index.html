<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <title>カラーパズル</title>
</head>
<body>
  <div class="app-header">
    <h1>カラーパズル <small id="version"></small></h1>
    <p class="seed-label">SEED: <span id="seed-display">--------</span></p>
  </div>

  <header>
    <div id="controls">
      <div class="stat-wrapper">
        <span class="stat-label">SCORE</span>
        <div id="score">0</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">CHAIN</span>
        <div id="chain">0</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">LEVEL</span>
        <div id="level">1</div>
      </div>

      <button id="resetBtn">↺ リスタート</button>
    </div>
  </header>

  <main>
    <div id="timebar" aria-label="残り時間">
      <div id="timebar-fill"></div>
      <span id="timebar-text">30</span>
    </div>
    <p class="hint">
      パネルを<kbd>ドラッグ</kbd>して動かそう &nbsp;·&nbsp; 同じ色を <strong>5個以上</strong> つなげると消える
    </p>
    <div id="preview" aria-hidden="true"></div>
    <div id="board" aria-label="パズル盤面"></div>
  </main>

  <footer>
    <div class="help">
      同じ色のパネルを上下左右に5個以上つなぐと、徐々に薄くなって消えます。<br>
      消えかけのかたまりに同じ色をつなぐと、消える時間がリセットされます。
    </div>
  </footer>

  <div id="gameover" class="hidden" aria-hidden="true">
    <div class="gameover-card">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-score">SCORE <span id="finalScore">0</span></div>
      <div class="score-ranking">
        <div class="ranking-title">BEST 10</div>
        <ol id="scoreList"></ol>
      </div>
      <button id="restartBtn">もう一度</button>
    </div>
  </div>

  <script type="module" src="dist/app.js" defer></script>
</body>
</html>

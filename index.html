<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <title>RENSA!</title>
</head>
<body>
  <div class="app-header" hidden>
    <h1>RENSA!  <small id="version"></small></h1>
    <p class="seed-label">SEED: <span id="seed-display">--------</span></p>
  </div>

  <header>
    <div id="controls">
      <div class="stat-wrapper">
        <span class="stat-label">SCORE</span>
        <div id="score">0</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">MAX CHAIN</span>
        <div id="maxchain">0</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">CHAIN</span>
        <div id="chain">0</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">LEVEL</span>
        <div id="level">1</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">TIME</span>
        <div id="playtime">0<small>s</small></div>
      </div>

      <button id="resetBtn">↺ リスタート</button>
    </div>
  </header>

  <main>
    <p class="hint">
      パネルを<kbd>ドラッグ</kbd>して動かそう &nbsp;·&nbsp; 同じ色を <strong>5個以上</strong> つなげると消えるよ。
    </p>
    <div id="timebar" aria-label="残り時間">
      <div id="timebar-fill"></div>
      <span id="timebar-text">30</span>
    </div>
    <div id="preview" aria-hidden="true"></div>
    <div id="board" aria-label="パズル盤面"></div>
  </main>

  <footer>
    <div class="help">
      同じ色のパネルを上下左右に5個以上つなぐと、徐々に薄くなって消えます。<br>
      消えかけのかたまりに同じ色をつなぐと、消える時間がリセットされます。
    </div>
  </footer>

  <div id="chain-milestone" aria-live="polite"></div>

  <div id="startscreen">
    <div class="start-card">
      <div class="start-deco">
        <span class="sp color-red"></span>
        <span class="sp color-blue"></span>
        <span class="sp color-green"></span>
        <span class="sp color-yellow"></span>
        <span class="sp color-purple"></span>
        <span class="sp color-red"></span>
        <span class="sp color-blue"></span>
        <span class="sp color-green"></span>
      </div>
      <h2 class="start-logo">
        <span style="color:var(--c-red)">R</span><span style="color:var(--c-blue)">E</span><span style="color:var(--c-green)">N</span><span style="color:var(--c-yellow)">S</span><span style="color:var(--c-purple)">A</span><span style="color:var(--primary)">!</span>
      </h2>
      <p class="start-desc">同じ色を5個以上つなげて消そう</p>
      <div class="start-bgm">
        <label for="bgm-select">BGM</label>
        <select id="bgm-select"></select>
      </div>
      <button id="startBtn">スタート</button>
    </div>
  </div>

  <div id="gameover" class="hidden" aria-hidden="true">
    <div class="gameover-card">
      <div class="gameover-title">GAME OVER</div>
      <div class="gameover-score">SCORE <span id="finalScore">0</span></div>
      <div class="score-ranking">
        <div class="ranking-title">BEST 10</div>
        <ol id="scoreList"></ol>
      </div>
      <button id="restartBtn">もう一度</button>
    </div>
  </div>

  <script type="module" src="dist/app.js" defer></script>
</body>
</html>

<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="stylesheet" href="style.css" />
  <title>カラーパズル</title>
</head>
<body>
  <div class="app-header">
    <h1>カラーパズル <small id="version"></small></h1>
  </div>

  <header>
    <div id="controls">
      <div class="stat-wrapper">
        <span class="stat-label">SCORE</span>
        <div id="score">0</div>
      </div>

      <div class="stat-wrapper">
        <span class="stat-label">CHAIN</span>
        <div id="chain">0</div>
      </div>

      <button id="resetBtn">↺ リセット</button>
    </div>
  </header>

  <main>
    <p class="hint">
      パネルを<kbd>ドラッグ</kbd>して動かそう &nbsp;·&nbsp; 同じ色を <strong>5個以上</strong> つなげると消える
    </p>
    <div id="board" aria-label="パズル盤面"></div>
  </main>

  <footer>
    <div class="help">
      同じ色のパネルを上下左右に5個以上つなぐと、徐々に薄くなって3秒後に消えます。
      消えかけのかたまりに同じ色をつなぐと、消える時間がリセットされます。
    </div>
  </footer>

  <script type="module" src="dist/app.js" defer></script>
</body>
</html>
